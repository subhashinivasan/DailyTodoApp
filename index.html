<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="app-heading"></h1>
        </header>
        <div class="input-area">
            <input type="text" id="new-todo-input" placeholder="">
            <input type="date" id="new-todo-date">
            <button id="add-todo-btn"></button>
        </div>
        <div class="todo-list-area">
            <ul id="todo-list"></ul>
        </div>
        <div class="calendar-area" id="calendar-helper"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
